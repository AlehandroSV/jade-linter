<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient - dark elegant -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d15;stop-opacity:1" />
    </radialGradient>

    <!-- Jade stone gradient - natural gem look -->
    <linearGradient id="jadeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d8a4e;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#1a6b35;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#0f5c2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a4a20;stop-opacity:1" />
    </linearGradient>

    <!-- Inner glow -->
    <radialGradient id="innerGlow" cx="30%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#22c55e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0" />
    </radialGradient>

    <!-- Highlight -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="50%" y2="50%">
      <stop offset="0%" style="stop-color:#86efac;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0" />
    </linearGradient>

    <!-- Subtle shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Gem inner shadow -->
    <filter id="innerShadow">
      <feOffset dx="0" dy="4"/>
      <feGaussianBlur stdDeviation="4"/>
      <feComposite operator="out" in="SourceGraphic"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>

    <!-- Subtle glow -->
    <filter id="subtleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>

  <!-- Subtle outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.2"/>

  <!-- Main gem - elegant hexagonal shape -->
  <g filter="url(#softShadow)">
    <!-- Gem body -->
    <polygon points="256,100 370,170 370,310 256,380 142,310 142,170" 
             fill="url(#jadeGradient)"/>
    
    <!-- Top facet -->
    <polygon points="256,100 310,140 256,180 202,140" 
             fill="url(#highlight)" opacity="0.5"/>
    
    <!-- Left facet shadow -->
    <polygon points="142,170 202,140 202,260 142,310" 
             fill="#0a4a20" opacity="0.3"/>
    
    <!-- Right facet highlight -->
    <polygon points="370,170 310,140 310,260 370,310" 
             fill="#2d8a4e" opacity="0.2"/>
    
    <!-- Inner glow overlay -->
    <ellipse cx="256" cy="240" rx="80" ry="60" fill="url(#innerGlow)"/>
  </g>

  <!-- Top highlight reflection -->
  <ellipse cx="230" cy="160" rx="40" ry="20" fill="#86efac" opacity="0.4" transform="rotate(-20 230 160)"/>

  <!-- Small sparkle top right -->
  <circle cx="320" cy="140" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="320" cy="140" r="6" fill="#ffffff" opacity="0.2"/>

  <!-- Tiny sparkle bottom left -->
  <circle cx="180" cy="280" r="2" fill="#ffffff" opacity="0.6"/>

  <!-- Letter J - clean and modern -->
  <text x="256" y="285" 
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" 
        font-size="150" 
        font-weight="900"
        fill="#ffffff" 
        text-anchor="middle"
        opacity="0.95"
        filter="url(#subtleGlow)">J</text>
</svg>
